<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTask Workspace | Login</title>

        <!-- Favicon Logo at browser-->
    <link rel="icon" type="image/png" href="img/logo.png"></link>
    
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    

    
    <!-- Shared Custom Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-h-screen" style="background-color: #f0ffd8;">

    <!-- ================= AUTHENTICATION CONTAINER ================= -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                
                <!-- Header Logo -->
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center mb-2">
                     <img src="img/logo.png" alt="EduTask Logo" style="width: 90px; height: 90px; object-fit: contain;">
                    </div>
                    <h2 class="fw-bold text-dark">EduTask Workspace</h2>
                </div>

                <!-- Auth card -->
                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-header bg-white border-0 pt-3">
                        <ul class="nav nav-pills nav-fill border-bottom pb-2">
                            <li class="nav-item">
                                <button id="tabLogin" class="nav-link active" onclick="toggleAuthTab('login')">Sign In</button>
                            </li>
                            <li class="nav-item">
                                <button id="tabRegister" class="nav-link text-secondary" onclick="toggleAuthTab('register')">Create Account</button>
                            </li>
                        </ul>
                    </div>
                    
                    <div class="card-body p-4">
                        
                        <!-- UI feedback alert -->
                        <div id="authAlert" class="alert d-none text-center py-2" role="alert">
                            <span id="authAlertText"></span>
                        </div>

                        <!-- Login Form -->
                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="mb-3">
                                <input type="email" id="email" class="form-control" placeholder="Email" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" id="password" class="form-control" placeholder="Password" required>
                            </div>
                            
                            <div class="alert alert-info py-2 px-3 small">
                                <i class="fa-solid fa-circle-info me-1"></i>
                                <strong>Default User Access:</strong><br>
                                Email: <u>student@uitm.edu.my</u><br>
                                Password: <u>password123</u>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Log In</button>
                        </form>

                        <!-- Register Form -->
                        <form id="registerForm" onsubmit="handleRegister(event)" class="d-none">
                            <div class="mb-3">
                                <input type="text" id="regName" class="form-control" placeholder="Name" required>
                            </div>
                            <div class="mb-3">
                                <input type="email" id="regEmail" class="form-control" placeholder="Email" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" id="regPassword" class="form-control" placeholder="Password (Min 6 chars)" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" id="regConfirmPassword" class="form-control" placeholder="Comfirm Password" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">Register New Account</button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Separated Authentication Logic -->
    <script src="auth.js"></script>
</body>
</html>
